name: gomoku

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
      target: dev
    command: ["cargo", "watch", "-x", "run -- --port 8000"]
    mem_limit: 1g
    memswap_limit: 1g
    cpus: "1.0"
    ports:
      - "8000:8000"
    profiles: ["dev"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/ >/dev/null 2>&1 || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 20
    volumes:
      - ./:/app
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - cargo_target:/app/target

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: dev
    environment:
      NEXT_PUBLIC_SOCKET_URL: http://localhost:8000
    mem_limit: 2g
    memswap_limit: 2g
    cpus: "1.0"
    ports:
      - "3000:3000"
    profiles: ["dev"]
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
      - client_next_cache:/app/.next

  server-prod:
    build:
      context: .
      dockerfile: Dockerfile.server
      target: prod
    command: ["./gomoku", "--port", "8000"]
    mem_limit: 1g
    memswap_limit: 1g
    cpus: "1.0"
    ports:
      - "8000:8000"
    profiles: ["prod"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/ >/dev/null 2>&1 || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 20

  client-prod:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: prod
    environment:
      NEXT_PUBLIC_SOCKET_URL: http://localhost:8000
    mem_limit: 2g
    memswap_limit: 2g
    cpus: "1.0"
    ports:
      - "3000:3000"
    profiles: ["prod"]
    depends_on:
      server-prod:
        condition: service_healthy

volumes:
  cargo_registry:
  cargo_git:
  cargo_target:
  client_node_modules:
  client_next_cache:
